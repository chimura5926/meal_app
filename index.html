<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>食事管理</title>
</head>

<body>

    <h1>チムキムキ日記</h1>

    <div id="loginScreen" style="text-align: center; margin-top: 50px;">
        <p>食事の記録を保存するにはログインしてください。</p>
        <button id="loginBtn" onclick="login()" style="font-size: 18px; padding: 10px 20px;">Googleでログイン</button>
    </div>

    <div id="profileScreen" style="display: none; text-align: center; margin-top: 30px;">
        <h2>あなたの情報を教えてください</h2>
        <p style="font-size: 14px; color: #666;">最適なPFCバランスとカロリーを計算するために必要です。</p>
        
        <div style="margin: 20px auto; text-align: left; max-width: 300px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; background-color: #f9f9f9;">
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold;">性別：</label><br>
                <label><input type="radio" name="gender" value="male" checked> 男性</label>
                <label style="margin-left: 15px;"><input type="radio" name="gender" value="female"> 女性</label>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold;">年齢：</label><br>
                <input type="number" id="profAge" style="width: 80px; padding: 5px;" min="1" max="120"> 歳
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold;">身長：</label><br>
                <input type="number" id="profHeight" style="width: 80px; padding: 5px;" min="100" max="250"> cm
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold;">体重：</label><br>
                <input type="number" id="profWeight" style="width: 80px; padding: 5px;" min="30" max="200"> kg
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold;">運動量：</label><br>
                <select id="profActivity" style="width: 100%; padding: 8px; margin-top: 5px; font-size: 14px;">
                    <option value="1.2">ほぼ運動しない (デスクワーク)</option>
                    <option value="1.375">軽い運動 (週1〜2回)</option>
                    <option value="1.55">中程度の運動 (週3〜5回)</option>
                    <option value="1.725">激しい運動 (週6〜7回)</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold;">目的：</label><br>
                <select id="profGoal" style="width: 100%; padding: 8px; margin-top: 5px; font-size: 14px;">
                    <option value="maintain">現状維持</option>
                    <option value="lose">減量 (ダイエット)</option>
                    <option value="gain">増量 (バルクアップ)</option>
                </select>
            </div>

        </div>
        
        <button onclick="saveProfile()" style="background-color: #4CAF50; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer;">
            目標を計算して始める
        </button>
    </div>

    <div id="appScreen" style="display: none;">

        <div style="text-align: right; margin-bottom: 20px;">
            <span id="userName" style="margin-right: 10px; font-weight: bold;"></span>
            <button id="logoutBtn" onclick="logout()">ログアウト</button>
        </div>

        <div style="text-align: right; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
            <input type="date" id="datePicker" onchange="changeDate()" style="font-size: 15px; padding: 4px 8px; border-radius: 5px; border: 1px solid #ccc;">
        </div>

        <div class="input-tabs" style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">
            <button id="tab-preset" onclick="switchInputMethod('presetArea')" class="active-tab">定番から選ぶ</button>
            <button id="tab-custom" onclick="switchInputMethod('customArea')">自分で入力</button>
            <button id="tab-ai" onclick="switchInputMethod('aiArea')">AIにお任せ</button>
        </div>

        <div id="presetArea" class="input-area" style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px;">
            <h3>定番から選ぶ</h3>
            <select id="food">
                <option value="" disabled selected>登録されている定番がありません</option>
            </select>
            <button onclick="addFood()" style="background-color: #4CAF50; color: white; border: none; padding: 6px 12px; border-radius: 4px;">追加</button>
        </div>
        
        <div id="aiArea" class="input-area" style="display: none; margin-top: 20px; border: 2px solid #4CAF50; padding: 15px; border-radius: 8px;">
            <h3 style="color: #4CAF50; margin-top: 0;">AIで追加</h3>
            <p style="font-size: 14px; color: #666; margin-bottom: 10px;">食事内容の入力、または写真を添付してください。</p>
            
            <input type="text" id="aiText" placeholder="(例) 天ぷら定食" style="width: 80%; padding: 5px; margin-bottom: 10px;">
            <br>
            <input type="file" id="aiImage" accept="image/*" style="margin-bottom: 10px;">
            <br>
            <button id="aiBtn" onclick="addAiFood()" style="background-color: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                AIで解析して追加
            </button>
            <p id="aiStatus" style="font-size: 14px; font-weight: bold; margin-top: 10px; min-height: 20px;"></p>
        </div>

        <div id="customArea" class="input-area" style="display: none; margin-top: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px;">
            <h3>手動追加</h3>
            <input type="text" id="customName" placeholder="食材名" style="width: 100px;">
            <input type="number" id="customP" placeholder="P" style="width: 50px;">
            <input type="number" id="customF" placeholder="F" style="width: 50px;">
            <input type="number" id="customC" placeholder="C" style="width: 50px;">
            <button onclick="addCustomFood()" style="background-color: #4CAF50; color: white; border: none; padding: 6px 12px; border-radius: 4px; margin-top: 10px;">追加</button>
        </div>



        <div id="aiLogArea" style="margin-top: 20px; text-align: left; max-width: 90%; margin: 20px auto; border: 1px dashed #999; padding: 10px; border-radius: 5px; background: #f9f9f9;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0; font-size: 14px; color: #555;">💬 AIからの返答ログ</h3>
                <button onclick="clearAiLogs()" style="background: #ff4c4c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">ログを消去</button>
            </div>
            <div id="aiLogContent" style="max-height: 150px; overflow-y: auto; font-size: 12px; font-family: monospace; white-space: pre-wrap; word-break: break-all;">
                </div>
        </div>

        <h2>今日の合計</h2>
        <table id="totalTable">
            <thead>
                <tr>
                    <th></th>
                    <th>P</th>
                    <th>F</th>
                    <th>C</th>
                    <th>kcal</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>目標</td>
                    <td id="targetP">140</td>
                    <td id="targetF">50</td>
                    <td id="targetC">300</td>
                    <td id="targetK">2200</td>
                </tr>
                <tr>
                    <td>現在</td>
                    <td id="p">0</td>
                    <td id="f">0</td>
                    <td id="c">0</td>
                    <td id="kcal">0</td>
                </tr>
                <tr>
                    <td>残り</td>
                    <td id="remainP">140</td>
                    <td id="remainF">50</td>
                    <td id="remainC">300</td>
                    <td id="remainK">2200</td>
                </tr>
            </tbody>
        </table>

        <h2>食事履歴</h2>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>食事</th>
                    <th>P</th>
                    <th>F</th>
                    <th>C</th>
                    <th>kcal</th>
                    <th>定番</th>
                    <th>削除</th>
                </tr>
            </thead>
            <tbody id="history"></tbody>
        </table>

        <h2>PFCバランス</h2>
        <div class="chart-container">
            <canvas id="pfcChart" width="100" height="100"></canvas>
        </div>
        
        <h2>1週間のカロリー推移</h2>
        <div style="width: 100%; max-width: 400px; margin: auto;">
            <canvas id="weeklyChart"></canvas>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script type="module" src="firebase.js"></script>
    <script type="module" src="app.js"></script>

</body>
</html>
